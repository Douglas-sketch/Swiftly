<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="image.png" type="image/x-icon">
</head>
<body>

    <header class="hero-header">
        <h1>Oferta Imperdível!</h1>
    </header>

    <main class="container">
        <section class="services-section">
            <h2 id="titulo-main">Nossos Diferenciais</h2>
            
            <div class="cards-grid">
                <article class="card">
                    <div class="card-icon">🚀</div>
                    <h3>Agilidade</h3>
                    <p>Entrega rápida com a qualidade que você merece.</p>
                </article>

                <article class="card">
                    <div class="card-icon">🛡️</div>
                    <h3>Segurança</h3>
                    <p>Seus dados protegidos com criptografia de ponta.</p>
                </article>

                <article class="card">
                    <div class="card-icon">💎</div>
                    <h3>Premium</h3>
                    <p>Experiência exclusiva para usuários exigentes.</p>
                </article>
            </div>
        </section>

        <section class="cta-download">
            <button class="btn-primary" id="enviar">Baixar Material Gratuito</button>
        </section>
    </main>

    <footer class="footer-modern">
        <div class="footer-content">
            <p>&copy; 2026 <img src="image.png" alt="Logo Swiftly" class="footer-logo">. Design Moderno e código limpo.</p>
            <nav class="footer-nav">
                <a href="#">Termos</a>
                <a href="#">Suporte</a>
                <a href="#">Redes Sociais</a>
            </nav>
        </div>
    </footer>

</body>
</html>
